apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
      - name: cassandra
        image: cassandra:4.1
        ports:
        - containerPort: 9042
        env:
        - name: CASSANDRA_CLUSTER_NAME
          value: "MyCluster"
        - name: CASSANDRA_SEEDS
          value: "cassandra"
        - name: CASSANDRA_START_RPC
          value: "true"
        volumeMounts:
        - name: cassandra-data
          mountPath: /var/lib/cassandra
  volumeClaimTemplates:
  - metadata:
      name: cassandra-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra
spec:
  type: NodePort
  selector:
    app: cassandra
  ports:
    - port: 9042
      targetPort: 9042
      nodePort: 30042
      name: cql

---
apiVersion: batch/v1
kind: Job
metadata:
  name: cassandra-init
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: cassandra-init
        image: cassandra:4.1
        command:
        - sh
        - -c
        - |
          echo "🔹 Criando keyspace e usuário..."
          cqlsh cassandra -e "
            CREATE KEYSPACE IF NOT EXISTS mykeyspace
            WITH replication = {'class':'SimpleStrategy','replication_factor':1};
            CREATE USER IF NOT EXISTS cassandra WITH PASSWORD 'cassandra' SUPERUSER;
          "
          echo "✅ Keyspace e usuário criados!"
